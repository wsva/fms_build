# Modifying metadata.annotations does not trigger a rolling update.
# You need to modify spec.template.metadata.annotations, which is part of the Pod template,
# and Kubernetes uses it to decide whether to perform a rolling update.

apiVersion: apps/v1
kind: Deployment
metadata:
  name: fms
  namespace: wsva
  annotations:
    build: "20260521_025830"
spec:
  replicas: 1
  selector:
    matchLabels:
      app: fms
  template:
    metadata:
      labels:
        app: fms
      annotations:
        build: "20260521_025830"
    spec:
      securityContext:
        runAsUser: 1000
        runAsGroup: 1000
      containers:
        - name: fms
          image: node:24.12.0
          imagePullPolicy: IfNotPresent
          env:
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: secrets
                  key: POSTGRES_PASSWORD
            - name: AUTH_SECRET
              valueFrom:
                secretKeyRef:
                  name: secrets
                  key: AUTH_SECRET
            - name: SMTP_HOST
              valueFrom:
                secretKeyRef:
                  name: secrets
                  key: SMTP_HOST
            - name: SMTP_USER
              valueFrom:
                secretKeyRef:
                  name: secrets
                  key: SMTP_USER
            - name: SMTP_PASS
              valueFrom:
                secretKeyRef:
                  name: secrets
                  key: SMTP_PASS
            - name: SMTP_FROM
              valueFrom:
                secretKeyRef:
                  name: secrets
                  key: SMTP_FROM
          command:
            - sh
            - -c
            - |
              set -e
              git clone https://github.com/wsva/fms_build /home/node/app
              cd /home/node/app
              echo 'DATABASE_URL=postgres://postgres:${POSTGRES_PASSWORD}@db:5432/fmsdb' > .env
              echo 'BETTER_AUTH_URL=https://lusworkshop.site' >> .env
              echo 'BETTER_AUTH_SECRET="${AUTH_SECRET}"' >> .env
              echo 'OAUTH2_AUTHORIZATION=https://lusworkshop.site/api/oauth2/authorize' >> .env
              echo 'OAUTH2_TOKEN=https://lusworkshop.site/api/oauth2/token' >> .env
              echo 'OAUTH2_USERINFO=https://lusworkshop.site/api/oauth2/userinfo' >> .env
              echo 'OAUTH2_LOGOUT=https://lusworkshop.site/api/oauth2/logout' >> .env
              echo 'OAUTH2_CLIENT_ID=als_next.js' >> .env
              echo 'OAUTH2_CHECK_IP=false' >> .env
              echo 'OAUTH2_RSA_KEY_FILE="/ssl/rsa.key"' >> .env
              echo 'OAUTH2_RSA_PUB_FILE="/ssl/rsa.pub"' >> .env
              echo 'SMTP_HOST=${SMTP_HOST}' >> .env
              echo 'SMTP_PORT=465' >> .env
              echo 'SMTP_SECURE=true' >> .env
              echo 'SMTP_USER=${SMTP_USER}' >> .env
              echo 'SMTP_PASS=${SMTP_PASS}' >> .env
              echo 'SMTP_FROM=${SMTP_FROM}' >> .env
              node server.js
          ports:
            - containerPort: 3000
          volumeMounts:
            - name: fms-data
              mountPath: /fms_data
            - name: ssl
              mountPath: /ssl
      volumes:
        - name: fms-data
          hostPath:
            path: /wsva/data/fms_data
            type: Directory
        - name: ssl
          hostPath:
            path: /wsva/ssl
---
apiVersion: v1
kind: Service
metadata:
  name: fms
  namespace: wsva
spec:
  type: ClusterIP
  selector:
    app: fms
  ports:
    - port: 3000
      targetPort: 3000